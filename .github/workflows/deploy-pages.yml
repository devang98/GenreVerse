name: Deploy GenreVerse to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Create .env
        run: |
          echo "VITE_APP_BASE_URL=/$(echo $GITHUB_REPOSITORY | cut -d '/' -f 2-)/" >> .env
          echo "VITE_GITHUB_REPOSITORY=$GITHUB_REPOSITORY" >> .env
          cat .env

      - name: Restore dependency cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-vite-build-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-vite-build-

      - name: Install dependencies
        run: npm ci

      - name: Build Vite site
        run: npm run build

      - name: Create Pages fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
